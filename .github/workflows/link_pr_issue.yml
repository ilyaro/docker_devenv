name: Link PR to Issue

# Trigger workflow on new pull requests

on:
  pull_request:
    types: [opened] #Run once pr is opened

jobs:
  link-issue:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # Allows updating PR title and body
    steps:
      - name: Check branch name
        id: check
        run: |
          [[ "${{ github.event.pull_request.head.ref }}" =~ (^|/)[0-9] ]] && echo "match=true" >> $GITHUB_OUTPUT || echo "match=false" >> $GITHUB_OUTPUT
      - name: Extract issue and update PR
        if: steps.check.outputs.match == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            // Extract branch name from the pull request
            const branch = context.payload.pull_request.head.ref;
            
            // Extract issue number from branch name using pattern: /digits- or digits-
            // Examples: "123-feature", "fix/456-bug" will extract 123, 456
            const match = branch.match(/(?:^|\/)(\d+)-/);
            if (!match) return;  // Exit if no issue number found in branch name
            
            const issueNum = match[1];
            const currentTitle = context.payload.pull_request.title;
            const currentBody = context.payload.pull_request.body || '';
            
            // Update PR title to include issue number and body to auto-close the linked issue
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              title: `#${issueNum} ${currentTitle}`,  // Prepend issue number to title
              body: `Closes #${issueNum}\n\n${currentBody}`  // Add "Closes" keyword to auto-close issue
            });