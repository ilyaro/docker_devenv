name: Create Docker Image Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.1)'
        required: true
      docker_tags:
        description: 'Docker image references (comma-separated, format: namespace/repository)'
        required: true

jobs:
  create-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Docker Image Details
        id: fetch-details
        run: |
          {
            echo 'RELEASE_BODY<<EOF'
            echo "# Docker Images for Release ${{ github.event.inputs.version }}"
            echo ""
            
            IFS=',' read -ra IMAGES <<< "${{ github.event.inputs.docker_tags }}"
            for image in "${IMAGES[@]}"; do
              image=$(echo "$image" | xargs)
              echo "Processing image: $image..."
              
              VERSION="${{ github.event.inputs.version }}"
              
              echo "## ${image}:${VERSION}"
              echo ""
              echo "**Repository:** \`${image}\`"
              echo "**Tag:** \`${VERSION}\`"
              echo ""
              
              # Fetch manifest list to get architecture info
              echo "### Supported Architectures"
              echo ""
              
              # Try to get manifest info using docker CLI or API
              # For GHCR, we can use the OCI Image Spec to inspect manifests
              MANIFEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
                "https://ghcr.io/v2/${image#ghcr.io/}/manifests/${VERSION}" 2>/dev/null || echo "")
              
              if [ ! -z "$MANIFEST" ] && echo "$MANIFEST" | jq . > /dev/null 2>&1; then
                # Parse manifest list for architectures
                echo "$MANIFEST" | jq -r '.manifests[] | 
                  "- **\(.platform.architecture | ascii_upcase)** (os: \(.platform.os)): `\(.digest)`"' \
                  2>/dev/null || echo "- Multi-architecture image"
              else
                echo "- Single or multi-platform image available"
              fi
              
              echo ""
              echo "### Pull Commands"
              echo "\`\`\`bash"
              echo "# Pull for current platform"
              echo "docker pull ${image}:${VERSION}"
              echo ""
              echo "# Pull specific architecture"
              echo "docker pull ${image}:${VERSION} --platform linux/amd64"
              echo "docker pull ${image}:${VERSION} --platform linux/arm64"
              echo "\`\`\`"
              echo ""
              echo "View on [GitHub Container Registry](https://github.com/${{ github.repository_owner }}/packages?repo_name=$(echo ${image} | cut -d'/' -f3))"
              echo ""
            done
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
